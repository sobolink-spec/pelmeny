<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — PixelForge</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container header-container">
      <a href="index.html"><img src="img/logo.png" alt="PixelForge Logo" class="logo"></a>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">Главная</a></li>
          <li><a href="games.html">Проекты</a></li>
          <li><a href="contact.html">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="container">
    <h1>Связаться с нами</h1>

    <form action="#" method="post" class="mb-5" novalidate>
      <div class="mb-3">
        <label for="name" class="form-label">Ваше имя</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label for="message" class="form-label">Сообщение</label>
        <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="subscribe" name="subscribe">
        <label class="form-check-label" for="subscribe">Подписаться на рассылку</label>
      </div>
      <fieldset class="mb-3">
        <legend>Какой тип игр вы предпочитаете?</legend>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="genre" id="genre1" value="action" checked>
          <label class="form-check-label" for="genre1">Экшен</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="genre" id="genre2" value="strategy">
          <label class="form-check-label" for="genre2">Стратегии</label>
        </div>
      </fieldset>
      <button type="submit" class="btn btn-primary">Отправить</button>
    </form>

    <h2>Видео о разработке</h2>
    <div class="ratio ratio-16x9 mb-5">
      <iframe src="https://www.youtube.com/watch?v=skfWVn2FIKo" title="Game Dev Journey" allowfullscreen></iframe>
    </div>
  </section>

  <footer>
    <div class="container footer-container">
      <p>&copy; 2025 PixelForge</p>
      <a href="#top">Наверх</a>
      <p><a href="sitemap.html">Карта сайта</a></p>
    </div>
  </footer>
</body>
</html>
